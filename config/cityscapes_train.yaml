# Ultralytics Cityscapes fine-tuning — use with scripts/train_semantic.py
# Requires cityscapes dataset prepared per https://docs.ultralytics.com/datasets/semantic/cityscapes/

path: cityscapes
train: images/train
val: images/val

# 19 Cityscapes classes (must match config/default.yaml names)
names:
  0: road
  1: sidewalk
  2: building
  3: wall
  4: fence
  5: pole
  6: traffic light
  7: traffic sign
  8: vegetation
  9: terrain
  10: sky
  11: person
  12: rider
  13: car
  14: truck
  15: bus
  16: train
  17: motorcycle
  18: bicycle
