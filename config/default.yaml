# Semantic segmentation class groupings.
#
# The active backend is an ADE20K-trained SegFormer (150 classes), so the
# ``ade20k_segmentation`` block below is what drives walkable / obstacle /
# hazard decisions. The small ``segmentation`` block is a generic fallback
# used only if the ADE20K block is ever absent.
segmentation:
  walkable_classes: [floor, road, sidewalk, path]
  obstacle_classes: [person, wall, building, door, car, fence, pole]
  hazard_classes: [stairs, step]

# ADE20K 150-class semantic segmentation (SegFormer, the active backend).
# Names are the first synonym of each ADE20K label (e.g. "sidewalk;pavement" -> "sidewalk",
# "person;individual;..." -> "person", "stairs;steps" -> "stairs"). The SegformerSegmenter
# normalizes model.config.id2label the same way, so these match at runtime.
# ADE20K covers indoor + outdoor surfaces (floor, wall, door, stairs) — that
# coverage is what removes the closed-set hallucination when the camera sees a
# hallway or an empty path.
ade20k_segmentation:
  walkable_classes:
    - floor
    - road
    - sidewalk
    - earth
    - path
    - rug
    - runway
    - field
  obstacle_classes:
    - person
    - car
    - bus
    - truck
    - van
    - bicycle
    - minibike
    - chair
    - table
    - sofa
    - plant
    - column
    - pole
    - railing
    - bannister
    - fence
    - bench
    - signboard
    - streetlight
    - wall
    - building
    - door
  hazard_classes:
    - stairs
    - stairway
    - escalator
    - step

# Allowed spoken commands (LLM must pick from this set)
commands:
  - move_left
  - move_right
  - go_forward
  - slow_down
  - stop

# Depth thresholds (meters, approximate — tune per calibration)
depth:
  near_threshold_m: 1.5
  critical_threshold_m: 0.8

# Pipeline
pipeline:
  max_queue_depth: 1
  skip_frames_on_backpressure: true

# Distance bucketizer (Requirement 6/15) — single point of change when real
# metric depth lands. Phrases stay stable; only thresholds and feet values
# need updating.
distance:
  immediate_max_m: 1.2
  near_max_m: 2.2
  mid_max_m: 3.2
  default_bucket: near
  phrases:
    immediate: "right in front of you"
    near: "about 6 feet ahead"
    mid: "about 10 feet ahead"
    far: "about 30 feet ahead"

# Voice queue (Requirement 9). Per-tier cooldowns in seconds. status_update
# only emits when nothing else has been spoken for ``status_update_interval_sec``.
voice:
  cooldowns:
    vision_stop: 0.0
    directional_warning: 2.0
    map_turn: 8.0
    approach_alert: 3.0
    status_update: 10.0
  status_update_interval_sec: 10.0

# Spatial perception + stairs heuristic (Requirements 2, 5, 14).
spatial:
  min_lane_walkable_ratio: 0.10
  stairs_detector_enabled: true
  stairs_min_edge_density: 0.08
  stairs_min_confidence: 0.4
