# Spatial-aware natural-language guidance — Template Library (Requirement 10).
#
# Instructive mode: phrases sound like a guide walking next to the user,
# giving step-by-step directions ("take a few steps forward", "take a right").
#
# Each scenario tag has 3-5 paraphrases. The PhraseComposer picks one per
# call, never picks the same one twice in a row when at least 2 are
# configured, and substitutes placeholders from GuidanceFacts.
#
# Placeholders the composer fills in:
#   {distance_phrase}    e.g. "about 30 feet ahead", "right in front of you"
#   {side}               left | right | ahead
#   {position_phrase}    ahead | on your left | on your right
#   {opposite_side}      right | left | ahead
#   {category}           person | car | bicycle | pole | ...
#   {category_list}      "person, bicycle"
#   {turn_direction}     left | right | forward | stop
#   {turn_direction_cap} Left | Right | Forward
#   {meters_to_turn}     numeric meters (rounded)
#   {feet_to_turn}       numeric feet (rounded)
#   {distance_remaining} just ahead | almost there | about N feet

vision_stop_generic:
  - "Wait."
  - "Hold up here."
  - "Pause for a moment."

vision_stop_with_cause:
  - "Wait, {category} {position_phrase}."
  - "Hold up — {category} {distance_phrase}, {position_phrase}."
  - "Stop for now, {category} {position_phrase}."
  - "Wait a moment, {category} blocking the path {position_phrase}."

directional_warning_simple:
  - "Take a {opposite_side}."
  - "Step toward your {opposite_side}."
  - "Lean a little to your {opposite_side}."

directional_warning_with_freespace:
  - "Take a {opposite_side}, your {opposite_side} is clear."
  - "Step {opposite_side}, there's open space that way."
  - "Move a little {opposite_side}; {category} {position_phrase}."

approach_alert_static:
  - "{category} {position_phrase}, {distance_phrase}."
  - "Heads up — {category} {position_phrase}."
  - "{category} {position_phrase}, watch out."

approach_alert_crossing:
  - "{category} crossing in front of you."
  - "Someone's crossing your path."
  - "{category} moving across, hold a moment."

map_turn_only:
  - "{distance_remaining}, take a {turn_direction}."
  - "Take a {turn_direction} {distance_remaining}."
  - "{turn_direction_cap} turn {distance_remaining}."

map_turn_with_vision_clear:
  - "{distance_remaining}, take a {turn_direction} — sidewalk is clear."
  - "Path is clear. Take a {turn_direction} {distance_remaining}."
  - "Take a {turn_direction} {distance_remaining}, your {turn_direction} is open."

map_turn_with_caution:
  - "Take a {turn_direction} in a moment, but slow down — {category} ahead."
  - "Slow down. {turn_direction_cap} turn ahead, but the {turn_direction} side is blocked."
  - "Hold for the {category} before taking the {turn_direction}."

map_off_route:
  - "You're off the route. Step to your {turn_direction}."
  - "Move toward your {turn_direction} to get back on the path."
  - "Off route — take a few steps to your {turn_direction}."

map_route_loading:
  - "Loading walking directions."
  - "Fetching your route, one moment."

map_route_failed:
  - "Walking route unavailable. Check your connection or try again."
  - "Could not load walking directions. Try setting the destination again."

status_update_clear:
  - "Path is clear, take a few steps forward."
  - "Open sidewalk ahead. Keep walking."
  - "All clear, you can keep going."
  - "Path looks good, walk on."

status_update_progress:
  - "Keep going, your destination is {distance_remaining}."
  - "You're on track. Destination {distance_remaining}."
  - "Continue forward, {distance_remaining} to go."
  - "Heading the right way. {distance_remaining} remaining."

stairs_warning_low_conf:
  - "Steps may be ahead — slow down."
  - "Possible steps coming up, take it easy."
  - "Watch your step, steps may be ahead."

stairs_warning_with_stop:
  - "Wait — steps right in front of you."
  - "Stop, steps ahead."
  - "Hold up — steps ahead."

lane_blocked_all_sides:
  - "Path blocked by {category_list}, slow down."
  - "{category_list} blocking the path. Wait a moment."
  - "No clear path — {category_list} ahead, slow down."

destination_reached:
  - "You've arrived."
  - "You're at your destination."
  - "You're here."
