<!DOCTYPE html>
<html>
<head>
    <title>Assistive Navigation - Phone Client</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: #000;
            color: #fff;
            overflow: hidden;
        }
        
        #container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        #video-container {
            flex: 1;
            position: relative;
            background: #000;
        }
        
        #video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
        }
        
        #status-bar {
            position: absolute;
            top: calc(env(safe-area-inset-top, 20px) + 60px);
            left: 20px;
            right: 20px;
            padding: 20px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
            cursor: pointer;
        }

        #dest-bar {
            position: absolute;
            top: env(safe-area-inset-top, 10px);
            left: 10px;
            right: 10px;
            display: flex;
            gap: 8px;
            z-index: 10;
            /* The parent #overlay has pointer-events: none so taps fall
               through to the video; we explicitly re-enable here so the
               input and Set button receive taps. Same trick used by the
               status bar and the controls bar. */
            pointer-events: auto;
        }

        #dest-input {
            flex: 1;
            padding: 10px 14px;
            border-radius: 10px;
            border: none;
            font-size: 16px;
            background: rgba(255, 255, 255, 0.95);
            color: #111;
            pointer-events: auto;
        }

        #set-dest-btn {
            padding: 10px 18px;
            border-radius: 10px;
            border: none;
            background: rgba(255, 255, 255, 0.95);
            color: #111;
            font-weight: 600;
            min-width: auto;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
            pointer-events: auto;
        }
        
        #status-bar.go {
            background: rgba(0, 120, 255, 0.9);
        }
        
        #status-bar.stop {
            background: rgba(255, 59, 48, 0.9);
        }
        
        #status-bar.slow {
            background: rgba(255, 149, 0, 0.9);
        }
        
        #status-bar.idle {
            background: rgba(100, 100, 100, 0.9);
        }
        
        #command {
            font-size: 36px;
            font-weight: bold;
            text-align: center;
            text-transform: uppercase;
        }
        
        #details {
            font-size: 14px;
            text-align: center;
            margin-top: 10px;
            opacity: 0.9;
        }
        
        #controls {
            position: absolute;
            left: 0;
            right: 0;
            bottom: 30px;
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 0 20px env(safe-area-inset-bottom, 0px);
            z-index: 10;
        }

        button {
            padding: 18px 40px;
            font-size: 20px;
            font-weight: bold;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
            min-width: 200px;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.4);
        }
        
        #start-btn {
            background: rgba(52, 199, 89, 0.9);
            color: white;
        }
        
        #stop-btn {
            background: rgba(255, 59, 48, 0.9);
            color: white;
        }
        
        button:active {
            transform: scale(0.95);
        }
        
        #stats {
            position: absolute;
            bottom: 100px;
            left: 20px;
            right: 20px;
            padding: 10px;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 10px;
            font-size: 12px;
            text-align: center;
        }

        #debug {
            position: absolute;
            bottom: 110px;
            left: 10px;
            right: 10px;
            max-height: 35vh;
            overflow-y: auto;
            padding: 8px 10px;
            background: rgba(0, 0, 0, 0.85);
            border: 1px solid #333;
            border-radius: 8px;
            font-family: monospace;
            font-size: 11px;
            color: #0f0;
            z-index: 5;
        }

        #debug.hidden { display: none; }
        
        #connection-status {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #ff3b30;
            transition: all 0.3s;
        }
        
        #connection-status.connected {
            background: #34c759;
        }
        
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div id="container">
        <div id="video-container">
            <video id="video" autoplay playsinline muted></video>
            <div id="overlay">
                <div id="dest-bar">
                    <input id="dest-input" type="text" placeholder="Destination (e.g. Empire State Building)" autocomplete="off">
                    <button id="set-dest-btn" type="button">Set</button>
                </div>
                <div id="status-bar" class="idle" onclick="toggleNavigation()">
                    <div id="command">Ready</div>
                    <div id="details">Tap anywhere to start navigation</div>
                </div>
                <div id="connection-status"></div>
                <div id="stats" class="hidden">
                    <div>FPS: <span id="fps">0</span> | Processing: <span id="proc-time">0</span>ms</div>
                    <div>Walkable: <span id="walkable">0</span>% | Obstacles: <span id="obstacles">0</span></div>
                </div>
                <div id="debug">debug log loading…</div>
            </div>
            <div id="controls">
                <button id="start-btn" onclick="startNavigation()">Start Navigation</button>
                <button id="stop-btn" onclick="stopNavigation()" class="hidden">Stop</button>
            </div>
        </div>
    </div>

    <script>
        // Visible debug log so we can diagnose phone-side issues without a
        // dev console. Touch a line to copy. Cleared on each reload.
        const _debugEl = document.getElementById('debug');
        const _debugLines = [];
        function dbg(...args) {
            const line =
                new Date().toLocaleTimeString() + ' ' +
                args.map(a => (typeof a === 'string' ? a : JSON.stringify(a))).join(' ');
            _debugLines.push(line);
            if (_debugLines.length > 40) _debugLines.shift();
            _debugEl.innerText = _debugLines.join('\n');
            _debugEl.scrollTop = _debugEl.scrollHeight;
            console.log(line);
        }
        dbg('client v3 loaded — secure context:', window.isSecureContext,
            'mediaDevices:', !!navigator.mediaDevices);
        // ============================================================
        // CONFIGURATION
        // ============================================================
        // Auto-detects the server URL from wherever this page was served.
        // Works for both local laptop (https://192.168.x.x:5000) and
        // cloud deployment (https://your-app.railway.app).
        const SERVER_URL = window.location.origin;
        
        // ============================================================
        // Global state
        // ============================================================
        let video = document.getElementById('video');
        let statusBar = document.getElementById('status-bar');
        let commandDiv = document.getElementById('command');
        let detailsDiv = document.getElementById('details');
        let statsDiv = document.getElementById('stats');
        let connStatus = document.getElementById('connection-status');
        let startBtn = document.getElementById('start-btn');
        let stopBtn = document.getElementById('stop-btn');
        
        let isRunning = false;
        let synth = window.speechSynthesis;
        let frameCount = 0;
        // Live GPS + compass — populated when the phone provides them.
        let lastPosition = { lat: null, lon: null, accuracy: null };
        let lastHeading = null;

        // Single entry point used by both the on-screen button and a tap on
        // the status banner (helpful on phones where the bottom button gets
        // clipped by the URL bar / home indicator).
        function toggleNavigation() {
            dbg('toggleNavigation tapped, isRunning=', isRunning);
            if (isRunning) {
                stopNavigation();
            } else {
                startNavigation();
            }
        }

        // Set destination — geocodes via /set_destination and arms map mode.
        async function setDestination() {
            const input = document.getElementById('dest-input');
            const address = input.value.trim();
            if (!address) {
                dbg('destination empty');
                return;
            }
            const body = new URLSearchParams({ address });
            try {
                const r = await fetch(SERVER_URL + '/set_destination', {
                    method: 'POST',
                    body,
                });
                const j = await r.json();
                if (j.ok) {
                    dbg('destination set:', j.address, '→',
                        j.lat.toFixed(4) + ',' + j.lon.toFixed(4));
                } else {
                    dbg('destination error:', j.error);
                }
            } catch (e) {
                dbg('destination request failed:', e.message);
            }
        }
        
        // ============================================================
        // GPS + compass — best effort. Browsers vary widely; we send what
        // we have and let the server fall back to .env defaults.
        // ============================================================
        function startGeolocation() {
            if (!('geolocation' in navigator)) {
                console.log('Geolocation not supported');
                return;
            }
            navigator.geolocation.watchPosition(
                (pos) => {
                    lastPosition.lat = pos.coords.latitude;
                    lastPosition.lon = pos.coords.longitude;
                    lastPosition.accuracy = pos.coords.accuracy;
                    // Some phones (and most laptops) only report heading
                    // when moving; treat null as "unknown".
                    if (pos.coords.heading != null && !Number.isNaN(pos.coords.heading)) {
                        lastHeading = pos.coords.heading;
                    }
                },
                (err) => console.log('Geolocation error:', err.message),
                { enableHighAccuracy: true, maximumAge: 1000, timeout: 10000 }
            );
        }

        function startCompass() {
            // iOS 13+ requires explicit permission; everywhere else, just listen.
            const handler = (event) => {
                // ``webkitCompassHeading`` is iOS-specific (0 = north, 360 = north).
                // ``alpha`` on Android is 0 = device pointing north, decreasing clockwise,
                // so we convert to compass heading by subtracting from 360.
                if (typeof event.webkitCompassHeading === 'number') {
                    lastHeading = event.webkitCompassHeading;
                } else if (typeof event.alpha === 'number') {
                    lastHeading = (360 - event.alpha) % 360;
                }
            };
            if (
                typeof DeviceOrientationEvent !== 'undefined' &&
                typeof DeviceOrientationEvent.requestPermission === 'function'
            ) {
                DeviceOrientationEvent.requestPermission()
                    .then((state) => {
                        if (state === 'granted') {
                            window.addEventListener('deviceorientation', handler, true);
                        }
                    })
                    .catch(() => {});
            } else {
                window.addEventListener('deviceorientationabsolute', handler, true);
                window.addEventListener('deviceorientation', handler, true);
            }
        }

        async function initCamera() {
            try {
                if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                    throw new Error(
                        'Camera API unavailable. Page must be served over HTTPS ' +
                        '(or http://localhost). isSecureContext=' + window.isSecureContext
                    );
                }
                dbg('requesting camera…');
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        facingMode: 'environment',  // Back camera
                        width: { ideal: 640 },
                        height: { ideal: 480 }
                    }
                });
                video.srcObject = stream;
                dbg('camera ok');
                console.log('Camera initialized');
            } catch (error) {
                commandDiv.textContent = 'Camera blocked';
                detailsDiv.textContent = (error.name || 'Error') + ': ' + error.message;
                statusBar.className = 'stop';
                dbg('CAMERA ERROR:', error.name || 'Error', error.message);
                console.error('Camera error:', error);
            }
        }
        
        // ============================================================
        // Check server connection
        // ============================================================
        async function checkConnection() {
            try {
                const response = await fetch(SERVER_URL + '/health');
                const data = await response.json();
                if (data.status === 'ok') {
                    connStatus.classList.add('connected');
                    return true;
                }
            } catch (error) {
                connStatus.classList.remove('connected');
                console.error('Server connection failed:', error);
                return false;
            }
            return false;
        }
        
        // ============================================================
        // Start navigation
        // ============================================================
        async function startNavigation() {
            dbg('startNavigation() tapped');
            // Check connection first
            const connected = await checkConnection();
            if (!connected) {
                dbg('server unreachable at', SERVER_URL);
                alert('Cannot connect to server at ' + SERVER_URL + '\n\nMake sure:\n1. Server is running on laptop\n2. Phone and laptop are on same WiFi\n3. IP address is correct');
                return;
            }
            dbg('server reachable');

            isRunning = true;
            frameCount = 0;
            
            startBtn.classList.add('hidden');
            stopBtn.classList.remove('hidden');
            statsDiv.classList.remove('hidden');
            
            commandDiv.textContent = 'Starting...';
            detailsDiv.textContent = 'Initializing navigation';
            
            processFrame();
        }
        
        // ============================================================
        // Stop navigation
        // ============================================================
        function stopNavigation() {
            isRunning = false;
            
            startBtn.classList.remove('hidden');
            stopBtn.classList.add('hidden');
            statsDiv.classList.add('hidden');
            
            statusBar.className = 'idle';
            commandDiv.textContent = 'Stopped';
            detailsDiv.textContent = 'Tap Start to resume';
        }
        
        // ============================================================
        // Process frame
        // ============================================================
        async function processFrame() {
            if (!isRunning) return;
            
            frameCount++;
            
            // Capture frame from video
            let canvas = document.createElement('canvas');
            canvas.width = 640;
            canvas.height = 480;
            let ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, 640, 480);
            
            // Convert to blob
            canvas.toBlob(async (blob) => {
                let formData = new FormData();
                formData.append('frame', blob, 'frame.jpg');
                if (lastPosition.lat != null) formData.append('lat', String(lastPosition.lat));
                if (lastPosition.lon != null) formData.append('lon', String(lastPosition.lon));
                if (lastPosition.accuracy != null) formData.append('accuracy', String(lastPosition.accuracy));
                if (lastHeading != null) formData.append('heading', String(lastHeading));
                
                try {
                    let response = await fetch(SERVER_URL + '/process_frame', {
                        method: 'POST',
                        body: formData
                    });
                    
                    if (!response.ok) {
                        throw new Error('Server error: ' + response.status);
                    }
                    
                    let result = await response.json();
                    
                    // Update UI
                    commandDiv.textContent = result.phrase;
                    detailsDiv.textContent = result.rationale || '';

                    // Update status bar color
                    statusBar.className = '';
                    if (result.command === 'stop') {
                        statusBar.classList.add('stop');
                    } else if (result.command === 'slow_down') {
                        statusBar.classList.add('slow');
                    } else {
                        statusBar.classList.add('go');
                    }

                    // Update stats — these come from the spatial pipeline
                    // via the ``facts`` payload now. Older builds put
                    // walkable_ratio / obstacle_pixels at the top level;
                    // we tolerate both so a stale phone tab still shows
                    // *some* numbers.
                    document.getElementById('fps').textContent = result.fps || 0;
                    document.getElementById('proc-time').textContent = result.processing_time_ms || 0;
                    let walkPct = 0;
                    let obstacleN = 0;
                    if (result.facts && result.facts.walkable_by_side) {
                        const w = result.facts.walkable_by_side;
                        // Show the *center* lane walkable as the headline.
                        walkPct = Math.round(((w.center || 0)) * 100);
                        // Number of distinct hazards across all sides.
                        const h = result.facts.hazards_by_side || {};
                        obstacleN =
                            (h.left || []).length +
                            (h.center || []).length +
                            (h.right || []).length;
                    } else {
                        walkPct = Math.round((result.walkable_ratio || 0) * 100);
                        obstacleN = result.obstacle_pixels || 0;
                    }
                    document.getElementById('walkable').textContent = walkPct;
                    document.getElementById('obstacles').textContent = obstacleN;

                    // Speech: throw away anything still pending in the
                    // browser's TTS queue before speaking the next phrase.
                    // Without this, if two consecutive frames are approved
                    // by the server's voice queue (within milliseconds of
                    // each other), both phrases pile up and the user hears
                    // them back-to-back even though the scene didn't change.
                    // Cancelling first means the *latest* command wins —
                    // which is exactly what a real-time guidance system
                    // wants. STOP commands stay reactive because they're
                    // always approved by the server, and `cancel()` clears
                    // any stale "go forward" so the STOP is heard now.
                    const wantsToSpeak =
                        (synth && Array.isArray(result.alerts) && result.alerts.length > 0) ||
                        (synth && result.speak);
                    if (wantsToSpeak) {
                        synth.cancel();
                    }

                    // Speak alerts FIRST (e.g. "Heavy vehicle approaching")
                    // so the user hears the warning before the command. The
                    // server already cooldown-gated these to roughly one
                    // per category every few seconds.
                    if (synth && Array.isArray(result.alerts)) {
                        for (const alert of result.alerts) {
                            const aUtt = new SpeechSynthesisUtterance(alert.phrase);
                            aUtt.rate = 1.15;
                            aUtt.volume = 1.0;
                            synth.speak(aUtt);
                            dbg('alert:', alert.phrase);
                        }
                    }

                    // Speak command — server already gated this through the
                    // dwell filter and voice-queue cooldown. ``result.speak``
                    // is the queue's verdict, not just the validator's.
                    if (result.speak && synth) {
                        const utterance = new SpeechSynthesisUtterance(result.phrase);
                        utterance.rate = 1.2;
                        utterance.volume = 1.0;
                        synth.speak(utterance);
                    }
                    
                    connStatus.classList.add('connected');
                    
                } catch (error) {
                    console.error('Processing error:', error);
                    commandDiv.textContent = 'Error';
                    detailsDiv.textContent = error.message;
                    statusBar.className = 'idle';
                    connStatus.classList.remove('connected');
                }
                
                // Process next frame after 300ms (3 FPS)
                setTimeout(processFrame, 300);
            }, 'image/jpeg', 0.8);
        }
        
        // ============================================================
        // Initialize on load
        // ============================================================
        window.onload = async () => {
            console.log('Initializing...');
            await initCamera();
            await checkConnection();
            startGeolocation();
            startCompass();
            // Hook up the destination bar handlers.
            document.getElementById('set-dest-btn').addEventListener('click', setDestination);
            document.getElementById('dest-input').addEventListener('keydown', (e) => {
                if (e.key === 'Enter') setDestination();
            });
            console.log('Ready!');
        };
        
        // Keep screen awake
        if ('wakeLock' in navigator) {
            navigator.wakeLock.request('screen').catch(err => {
                console.log('Wake lock error:', err);
            });
        }
    </script>
</body>
</html>
