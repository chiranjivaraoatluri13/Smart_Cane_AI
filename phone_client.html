<!DOCTYPE html>
<html lang="en">
<head>
    <title>Assistive Navigation</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: #000;
            color: #fff;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        /* ── Camera fills the whole background ── */
        #video {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            z-index: 0;
        }

        /* ── Full-screen overlay — children opt-in to pointer events ── */
        #overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 10;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: stretch;
        }

        /* ════════════════════════════════════════
           TOP: Search bar
        ════════════════════════════════════════ */
        #search-area {
            pointer-events: auto;
            padding: calc(env(safe-area-inset-top, 12px) + 8px) 16px 0;
            position: relative;
        }

        #search-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            background: #fff;
            border-radius: 26px;
            height: 52px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.55);
            overflow: visible;
        }

        #search-icon {
            flex-shrink: 0;
            width: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #555;
            font-size: 18px;
        }

        #search-input {
            flex: 1;
            border: none;
            outline: none;
            background: transparent;
            font-size: 16px;
            color: #111;
            padding-right: 12px;
            height: 100%;
        }

        #search-input::placeholder { color: #999; }

        /* Suggestions dropdown */
        #suggestions {
            position: absolute;
            top: calc(100% + 6px);
            left: 0; right: 0;
            background: #fff;
            border-radius: 14px;
            box-shadow: 0 6px 24px rgba(0,0,0,0.45);
            overflow: hidden;
            z-index: 100;
            display: none;
        }

        .suggestion-item {
            display: flex;
            align-items: center;
            height: 52px;
            padding: 0 16px;
            cursor: pointer;
            border-bottom: 1px solid #f0f0f0;
            color: #111;
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .suggestion-item:last-child { border-bottom: none; }

        .suggestion-item:active { background: #f5f5f5; }

        .suggestion-pin {
            flex-shrink: 0;
            margin-right: 10px;
            color: #888;
            font-size: 16px;
        }

        /* Confirmation toast */
        #dest-confirm {
            margin-top: 8px;
            padding: 8px 14px;
            border-radius: 10px;
            background: rgba(0,140,0,0.88);
            color: #fff;
            font-size: 13px;
            text-align: center;
            display: none;
            pointer-events: none;
        }

        /* ════════════════════════════════════════
           CENTER: Command display
        ════════════════════════════════════════ */
        #command-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 0 24px;
            pointer-events: none;
        }

        #command {
            font-size: 48px;
            font-weight: 700;
            text-align: center;
            text-transform: uppercase;
            color: #fff;
            text-shadow: 0 2px 12px rgba(0,0,0,0.8);
            line-height: 1.1;
        }

        #details {
            margin-top: 12px;
            font-size: 16px;
            color: #ddd;
            text-align: center;
            text-shadow: 0 1px 6px rgba(0,0,0,0.9);
            max-width: 320px;
        }

        /* ════════════════════════════════════════
           BOTTOM: Route status + Start/Stop button
        ════════════════════════════════════════ */
        #bottom-area {
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-bottom: calc(env(safe-area-inset-bottom, 16px) + 16px);
            gap: 12px;
        }

        #route-status {
            pointer-events: none;
            padding: 8px 20px;
            border-radius: 20px;
            background: rgba(0,0,0,0.65);
            backdrop-filter: blur(6px);
            color: #fff;
            font-size: 15px;
            text-align: center;
            display: none;
            max-width: calc(100vw - 40px);
        }

        #controls {
            pointer-events: auto;
            display: flex;
            justify-content: center;
        }

        #start-btn, #stop-btn {
            width: 200px;
            height: 60px;
            font-size: 20px;
            font-weight: 700;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 18px rgba(0,0,0,0.5);
            transition: transform 0.15s;
        }

        #start-btn { background: #34c759; color: #fff; }
        #stop-btn  { background: #ff3b30; color: #fff; }

        #start-btn:active, #stop-btn:active { transform: scale(0.95); }

        /* ════════════════════════════════════════
           Connection dot (top-right)
        ════════════════════════════════════════ */
        #connection-status {
            position: fixed;
            top: calc(env(safe-area-inset-top, 12px) + 18px);
            right: 18px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #ff3b30;
            z-index: 20;
            pointer-events: none;
            transition: background 0.3s;
        }

        #connection-status.connected { background: #34c759; }

        /* ════════════════════════════════════════
           Debug panel (bottom-right, collapsible)
        ════════════════════════════════════════ */
        #debug-toggle {
            position: fixed;
            bottom: calc(env(safe-area-inset-bottom, 16px) + 80px);
            right: 12px;
            z-index: 30;
            pointer-events: auto;
            background: rgba(0,0,0,0.7);
            border: 1px solid #444;
            border-radius: 8px;
            color: #0f0;
            font-size: 11px;
            padding: 4px 8px;
            cursor: pointer;
            user-select: none;
        }

        #debug {
            position: fixed;
            bottom: calc(env(safe-area-inset-bottom, 16px) + 108px);
            left: 10px;
            right: 10px;
            max-height: 30vh;
            overflow-y: auto;
            padding: 8px 10px;
            background: rgba(0,0,0,0.88);
            border: 1px solid #333;
            border-radius: 8px;
            font-family: monospace;
            font-size: 11px;
            color: #0f0;
            z-index: 25;
            pointer-events: auto;
            display: none;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <!-- Camera background -->
    <video id="video" autoplay playsinline muted></video>

    <!-- Connection indicator -->
    <div id="connection-status"></div>

    <!-- Main overlay -->
    <div id="overlay">

        <!-- TOP: Search bar -->
        <div id="search-area">
            <div id="search-wrapper">
                <div id="search-icon">🔍</div>
                <input
                    id="search-input"
                    type="text"
                    placeholder="Search destination…"
                    autocomplete="off"
                    autocorrect="off"
                    spellcheck="false"
                >
                <!-- Suggestions dropdown (inside wrapper for positioning) -->
                <div id="suggestions"></div>
            </div>
            <div id="dest-confirm"></div>
        </div>

        <!-- CENTER: Command display -->
        <div id="command-area">
            <div id="command">Ready</div>
            <div id="details">Tap Start to begin navigation</div>
        </div>

        <!-- BOTTOM: Route status + button -->
        <div id="bottom-area">
            <div id="route-status"></div>
            <div id="controls">
                <button id="start-btn" onclick="startNavigation()">Start Navigation</button>
                <button id="stop-btn"  onclick="stopNavigation()" class="hidden">Stop</button>
            </div>
        </div>

    </div>

    <!-- Debug panel toggle (outside overlay so it's always tappable) -->
    <div id="debug-toggle" onclick="toggleDebug()">DBG ▸</div>
    <div id="debug">debug log loading…</div>

    <script>
        // ============================================================
        // Debug log
        // ============================================================
        const _debugEl = document.getElementById('debug');
        const _debugLines = [];
        function dbg(...args) {
            const line =
                new Date().toLocaleTimeString() + ' ' +
                args.map(a => (typeof a === 'string' ? a : JSON.stringify(a))).join(' ');
            _debugLines.push(line);
            if (_debugLines.length > 40) _debugLines.shift();
            _debugEl.innerText = _debugLines.join('\n');
            _debugEl.scrollTop = _debugEl.scrollHeight;
            console.log(line);
        }

        function toggleDebug() {
            const panel = document.getElementById('debug');
            const btn   = document.getElementById('debug-toggle');
            if (panel.style.display === 'block') {
                panel.style.display = 'none';
                btn.textContent = 'DBG ▸';
            } else {
                panel.style.display = 'block';
                btn.textContent = 'DBG ▾';
            }
        }

        dbg('client v4 loaded — secure context:', window.isSecureContext,
            'mediaDevices:', !!navigator.mediaDevices);

        // ============================================================
        // Configuration
        // ============================================================
        const SERVER_URL = window.location.origin;

        // ============================================================
        // Global state
        // ============================================================
        const video       = document.getElementById('video');
        const commandDiv  = document.getElementById('command');
        const detailsDiv  = document.getElementById('details');
        const connStatus  = document.getElementById('connection-status');
        const startBtn    = document.getElementById('start-btn');
        const stopBtn     = document.getElementById('stop-btn');
        const routeStatus = document.getElementById('route-status');

        let isRunning   = false;
        let synth       = window.speechSynthesis;
        let frameCount  = 0;
        let lastPosition = { lat: null, lon: null, accuracy: null };
        let lastHeading  = null;

        // ── On-device depth (Depth Anything V2 via transformers.js) ──
        // Depth runs on the phone GPU/NPU in the browser. We compute it on
        // every Nth processed frame and reuse the last value in between so a
        // ~300-700ms inference never blocks the per-frame upload loop. The
        // server falls back to its geometric proxy whenever depth_m is absent.
        const DEPTH_EVERY_N = 3;          // run depth on 1 of every N frames
        let lastDepthM      = null;       // most recent approx obstacle depth (m)
        let depthBusy       = false;      // guard: one inference at a time
        let _lastDepthLogAt = 0;

        // ============================================================
        // Navigation toggle (tap status area or button)
        // ============================================================
        function toggleNavigation() {
            dbg('toggleNavigation tapped, isRunning=', isRunning);
            if (isRunning) {
                stopNavigation();
            } else {
                startNavigation();
            }
        }

        // ============================================================
        // Destination search — Nominatim suggestions
        // ============================================================
        const searchInput   = document.getElementById('search-input');
        const suggestionsEl = document.getElementById('suggestions');
        const destConfirm   = document.getElementById('dest-confirm');

        let _suggestTimer = null;

        async function fetchSuggestions(query) {
            if (query.length < 2) { hideSuggestions(); return; }
            try {
                const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query)}&format=json&limit=5&addressdetails=1`;
                const r = await fetch(url, { headers: { 'Accept-Language': 'en' } });
                const results = await r.json();
                showSuggestions(results);
            } catch(e) {
                hideSuggestions();
            }
        }

        function showSuggestions(results) {
            if (!results || results.length === 0) { hideSuggestions(); return; }
            suggestionsEl.innerHTML = '';
            results.slice(0, 5).forEach(result => {
                const label = result.display_name.length > 60
                    ? result.display_name.slice(0, 60) + '…'
                    : result.display_name;
                const item = document.createElement('div');
                item.className = 'suggestion-item';
                item.innerHTML = `<span class="suggestion-pin">📍</span><span>${label}</span>`;
                item.addEventListener('pointerdown', (e) => {
                    e.preventDefault();
                    searchInput.value = result.display_name;
                    hideSuggestions();
                    setDestination(result.display_name);
                });
                suggestionsEl.appendChild(item);
            });
            suggestionsEl.style.display = 'block';
        }

        function hideSuggestions() {
            suggestionsEl.style.display = 'none';
            suggestionsEl.innerHTML = '';
        }

        async function setDestination(address) {
            if (!address) address = searchInput.value.trim();
            if (!address) { dbg('destination empty'); return; }

            hideSuggestions();

            destConfirm.style.display = 'block';
            destConfirm.style.background = 'rgba(0,0,0,0.75)';
            destConfirm.textContent = '🔍 Finding ' + address + '…';

            const body = new URLSearchParams({ address });
            try {
                const r = await fetch(SERVER_URL + '/set_destination', { method: 'POST', body });
                const j = await r.json();
                if (j.ok) {
                    destConfirm.style.background = 'rgba(0,140,0,0.88)';
                    destConfirm.textContent = '✓ Navigating to ' + address;
                    dbg('destination set:', address, '→', j.lat.toFixed(4) + ',' + j.lon.toFixed(4));
                    setTimeout(() => { destConfirm.style.display = 'none'; }, 4000);
                } else {
                    destConfirm.style.background = 'rgba(180,0,0,0.88)';
                    destConfirm.textContent = '✗ Not found: ' + address;
                    dbg('destination error:', j.error);
                    setTimeout(() => { destConfirm.style.display = 'none'; }, 4000);
                }
            } catch (e) {
                destConfirm.style.background = 'rgba(180,0,0,0.88)';
                destConfirm.textContent = '✗ Connection error';
                dbg('destination request failed:', e.message);
                setTimeout(() => { destConfirm.style.display = 'none'; }, 4000);
            }
        }

        // ============================================================
        // GPS + compass
        // ============================================================
        function startGeolocation() {
            if (!('geolocation' in navigator)) {
                console.log('Geolocation not supported');
                return;
            }
            navigator.geolocation.watchPosition(
                (pos) => {
                    lastPosition.lat      = pos.coords.latitude;
                    lastPosition.lon      = pos.coords.longitude;
                    lastPosition.accuracy = pos.coords.accuracy;
                    if (pos.coords.heading != null && !Number.isNaN(pos.coords.heading)) {
                        lastHeading = pos.coords.heading;
                    }
                },
                (err) => console.log('Geolocation error:', err.message),
                { enableHighAccuracy: true, maximumAge: 1000, timeout: 10000 }
            );
        }

        function startCompass() {
            const handler = (event) => {
                if (typeof event.webkitCompassHeading === 'number') {
                    lastHeading = event.webkitCompassHeading;
                } else if (typeof event.alpha === 'number') {
                    lastHeading = (360 - event.alpha) % 360;
                }
            };
            if (
                typeof DeviceOrientationEvent !== 'undefined' &&
                typeof DeviceOrientationEvent.requestPermission === 'function'
            ) {
                DeviceOrientationEvent.requestPermission()
                    .then((state) => {
                        if (state === 'granted') {
                            window.addEventListener('deviceorientation', handler, true);
                        }
                    })
                    .catch(() => {});
            } else {
                window.addEventListener('deviceorientationabsolute', handler, true);
                window.addEventListener('deviceorientation', handler, true);
            }
        }

        // ============================================================
        // Camera
        // ============================================================
        async function initCamera() {
            try {
                if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                    throw new Error(
                        'Camera API unavailable. Page must be served over HTTPS ' +
                        '(or http://localhost). isSecureContext=' + window.isSecureContext
                    );
                }
                dbg('requesting camera…');
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        facingMode: 'environment',
                        width:  { ideal: 640 },
                        height: { ideal: 480 }
                    }
                });
                video.srcObject = stream;
                dbg('camera ok');
            } catch (error) {
                commandDiv.textContent = 'Camera blocked';
                detailsDiv.textContent = (error.name || 'Error') + ': ' + error.message;
                dbg('CAMERA ERROR:', error.name || 'Error', error.message);
                console.error('Camera error:', error);
            }
        }

        // ============================================================
        // Server connection check
        // ============================================================
        async function checkConnection() {
            try {
                const response = await fetch(SERVER_URL + '/health');
                const data = await response.json();
                if (data.status === 'ok') {
                    connStatus.classList.add('connected');
                    return true;
                }
            } catch (error) {
                connStatus.classList.remove('connected');
                console.error('Server connection failed:', error);
                return false;
            }
            return false;
        }

        // ============================================================
        // Start navigation
        // ============================================================
        async function startNavigation() {
            dbg('startNavigation() tapped');
            const connected = await checkConnection();
            if (!connected) {
                dbg('server unreachable at', SERVER_URL);
                alert('Cannot connect to server at ' + SERVER_URL +
                    '\n\nMake sure:\n1. Server is running on laptop\n2. Phone and laptop are on same WiFi\n3. IP address is correct');
                return;
            }
            dbg('server reachable');

            isRunning  = true;
            frameCount = 0;

            startBtn.classList.add('hidden');
            stopBtn.classList.remove('hidden');

            commandDiv.textContent = 'Starting…';
            detailsDiv.textContent = 'Initializing navigation';

            processFrame();
        }

        // ============================================================
        // Stop navigation
        // ============================================================
        function stopNavigation() {
            isRunning = false;

            startBtn.classList.remove('hidden');
            stopBtn.classList.add('hidden');

            routeStatus.style.display = 'none';
            commandDiv.textContent = 'Stopped';
            detailsDiv.textContent = 'Tap Start to resume';
        }

        // ============================================================
        // On-device depth update (non-blocking)
        // ============================================================
        async function maybeUpdateDepth(canvas) {
            if (depthBusy) return;
            if (frameCount % DEPTH_EVERY_N !== 0) return;
            if (typeof window.computeDepthMeters !== 'function') return;
            depthBusy = true;
            try {
                const m = await window.computeDepthMeters(canvas);
                if (m != null && !Number.isNaN(m)) {
                    lastDepthM = m;
                    const now = Date.now();
                    if (now - _lastDepthLogAt > 2000) {
                        _lastDepthLogAt = now;
                        dbg('depth', m.toFixed(2) + 'm', window.__depthStatus || '');
                    }
                }
            } catch (e) {
                dbg('depth error:', e.message);
            } finally {
                depthBusy = false;
            }
        }

        // ============================================================
        // Process frame
        // ============================================================
        async function processFrame() {
            if (!isRunning) return;

            frameCount++;

            const canvas = document.createElement('canvas');
            canvas.width  = 640;
            canvas.height = 480;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, 640, 480);

            // Fire-and-forget on-device depth on every Nth frame. It updates
            // `lastDepthM` for subsequent frames rather than blocking this one.
            maybeUpdateDepth(canvas);

            canvas.toBlob(async (blob) => {
                const formData = new FormData();
                formData.append('frame', blob, 'frame.jpg');
                if (lastPosition.lat      != null) formData.append('lat',      String(lastPosition.lat));
                if (lastPosition.lon      != null) formData.append('lon',      String(lastPosition.lon));
                if (lastPosition.accuracy != null) formData.append('accuracy', String(lastPosition.accuracy));
                if (lastHeading           != null) formData.append('heading',  String(lastHeading));
                if (lastDepthM            != null) formData.append('depth_m',  String(lastDepthM));

                try {
                    const response = await fetch(SERVER_URL + '/process_frame', {
                        method: 'POST',
                        body: formData
                    });

                    if (!response.ok) throw new Error('Server error: ' + response.status);

                    const result = await response.json();

                    // ── Command text ──
                    commandDiv.textContent = result.phrase;

                    // ── Details / route cue ──
                    let detailText = result.rationale || '';
                    if (result.facts && result.facts.route_cue) {
                        const rc   = result.facts.route_cue;
                        const feet = Math.round((rc.meters_to_turn || 0) * 3.281);
                        if (rc.turn === 'stop') {
                            detailText = '📍 Destination in ' + feet + ' ft';
                        } else if (rc.turn === 'left') {
                            detailText = '↰ Turn left in ' + feet + ' ft';
                        } else if (rc.turn === 'right') {
                            detailText = '↱ Turn right in ' + feet + ' ft';
                        } else if (rc.turn === 'forward') {
                            detailText = '↑ Continue ' + feet + ' ft';
                        }
                    }
                    if (lastPosition.lat == null) {
                        detailText = '⚠ No GPS — location permission needed for directions';
                    }
                    detailsDiv.textContent = detailText;

                    // ── Route status strip ──
                    if (result.facts && result.facts.route_cue) {
                        routeStatus.textContent = detailText;
                        routeStatus.style.display = 'block';
                    }

                    // ── Speech ──
                    const wantsToSpeak =
                        (synth && Array.isArray(result.alerts) && result.alerts.length > 0) ||
                        (synth && result.speak);
                    if (wantsToSpeak) synth.cancel();

                    if (synth && Array.isArray(result.alerts)) {
                        for (const alert of result.alerts) {
                            const aUtt = new SpeechSynthesisUtterance(alert.phrase);
                            aUtt.rate   = 1.15;
                            aUtt.volume = 1.0;
                            synth.speak(aUtt);
                            dbg('alert:', alert.phrase);
                        }
                    }

                    if (result.speak && synth) {
                        const utterance = new SpeechSynthesisUtterance(result.phrase);
                        utterance.rate   = 1.2;
                        utterance.volume = 1.0;
                        synth.speak(utterance);
                    }

                    connStatus.classList.add('connected');

                } catch (error) {
                    console.error('Processing error:', error);
                    commandDiv.textContent = 'Error';
                    detailsDiv.textContent = error.message;
                    connStatus.classList.remove('connected');
                }

                setTimeout(processFrame, 300);
            }, 'image/jpeg', 0.8);
        }

        // ============================================================
        // Initialize on load
        // ============================================================
        window.onload = async () => {
            console.log('Initializing…');
            await initCamera();
            await checkConnection();
            startGeolocation();
            startCompass();

            // Search input: debounced suggestions on typing
            searchInput.addEventListener('input', () => {
                clearTimeout(_suggestTimer);
                const q = searchInput.value.trim();
                _suggestTimer = setTimeout(() => fetchSuggestions(q), 300);
            });

            // Enter key submits the current text directly
            searchInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    hideSuggestions();
                    setDestination(searchInput.value.trim());
                    searchInput.blur();
                }
            });

            // Tap outside search area hides suggestions
            document.addEventListener('pointerdown', (e) => {
                if (!document.getElementById('search-area').contains(e.target)) {
                    hideSuggestions();
                }
            });

            console.log('Ready!');
        };

        // Keep screen awake
        if ('wakeLock' in navigator) {
            navigator.wakeLock.request('screen').catch(err => {
                console.log('Wake lock error:', err);
            });
        }
    </script>

    <!-- ============================================================
         On-device monocular depth (Depth Anything V2 via transformers.js).
         Runs in the phone browser on WebGPU (falls back to WASM). Exposes
         window.computeDepthMeters(canvas) -> Promise<number|null>. The phone
         turns the model's per-frame relative depth into an approximate
         obstacle distance in meters; the server's bucketize() consumes it
         unchanged. No hosted GPU required.
    ============================================================ -->
    <script type="module">
        import {
            pipeline,
            env,
        } from 'https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.5.1';

        // Allow remote model download from the HuggingFace hub; disable the
        // local-model lookup (we have no bundled weights).
        env.allowLocalModels = false;

        const MODEL_ID = 'onnx-community/depth-anything-v2-small';

        // Calibration. Depth Anything outputs *relative inverse depth*
        // (larger = closer), normalized per frame. We take a high percentile
        // of the predicted depth in the center-bottom walking band as the
        // "nearest object" reading, normalize it against the frame's own
        // min/max to a [0,1] closeness, then map closeness -> meters. The
        // bounds below define the spoken-distance range; tune DEPTH_CALIBRATION
        // on your phone (stand a known distance from a wall and read the log).
        const DEPTH_MIN_M       = 0.5;   // clamp floor (very close)
        const DEPTH_MAX_M       = 8.0;   // clamp ceiling ("far")
        const DEPTH_CALIBRATION = 1.0;   // multiplicative scale, tune on device
        const NEAR_PERCENTILE   = 0.90;  // 0.90 = treat closest 10% as "object"

        let depthPipe    = null;
        let depthLoading = false;
        window.__depthStatus = 'idle';

        async function initDepth() {
            if (depthPipe || depthLoading) return;
            depthLoading = true;
            const device = ('gpu' in navigator) ? 'webgpu' : 'wasm';
            window.__depthStatus = 'loading (' + device + ')';
            console.log('[depth] loading', MODEL_ID, 'on', device);
            try {
                depthPipe = await pipeline('depth-estimation', MODEL_ID, {
                    device,
                    dtype: device === 'webgpu' ? 'fp16' : 'q8',
                });
                window.__depthStatus = 'ready (' + device + ')';
                console.log('[depth] ready on', device);
            } catch (e) {
                window.__depthStatus = 'failed: ' + (e && e.message);
                console.error('[depth] load failed', e);
                depthPipe = null;
            } finally {
                depthLoading = false;
            }
        }

        window.computeDepthMeters = async function (canvas) {
            if (!depthPipe) { initDepth(); return null; }
            try {
                const out = await depthPipe(canvas);
                const t = out && out.predicted_depth;
                if (!t || !t.data || !t.dims) return null;

                const data = t.data; // Float32Array, larger = closer
                let h, w;
                if (t.dims.length === 3) { h = t.dims[1]; w = t.dims[2]; }
                else if (t.dims.length === 2) { h = t.dims[0]; w = t.dims[1]; }
                else { return null; }

                // Global min/max for per-frame normalization.
                let gmin = Infinity, gmax = -Infinity;
                for (let i = 0; i < data.length; i++) {
                    const v = data[i];
                    if (v < gmin) gmin = v;
                    if (v > gmax) gmax = v;
                }
                if (!(gmax > gmin)) return null;

                // Center-bottom walking band: bottom 40% rows, center 50% cols.
                const y0 = Math.floor(h * 0.60);
                const x0 = Math.floor(w * 0.25);
                const x1 = Math.floor(w * 0.75);
                const band = [];
                for (let y = y0; y < h; y++) {
                    const row = y * w;
                    for (let x = x0; x < x1; x++) band.push(data[row + x]);
                }
                if (band.length === 0) return null;

                // Nearest object = high inverse-depth percentile in the band.
                band.sort((a, b) => a - b);
                const idx = Math.min(
                    band.length - 1,
                    Math.floor(band.length * NEAR_PERCENTILE)
                );
                const near = band[idx];

                // closeness in [0,1] (1 = closest pixel in the frame).
                const closeness = (near - gmin) / (gmax - gmin);
                // Closer -> fewer meters (inverse mapping).
                let meters = DEPTH_MAX_M - closeness * (DEPTH_MAX_M - DEPTH_MIN_M);
                meters *= DEPTH_CALIBRATION;
                meters = Math.max(DEPTH_MIN_M, Math.min(DEPTH_MAX_M, meters));
                return meters;
            } catch (e) {
                window.__depthStatus = 'infer error: ' + (e && e.message);
                console.error('[depth] inference error', e);
                return null;
            }
        };

        window.initDepth = initDepth;
        // Kick off the (cached) model download immediately so it's ready by
        // the time the user taps Start.
        initDepth();
    </script>
</body>
</html>
