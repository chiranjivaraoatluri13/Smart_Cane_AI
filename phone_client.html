<!DOCTYPE html>
<html lang="en">
<head>
    <title>Assistive Navigation</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link
        rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin=""
    >
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: #000;
            color: #fff;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        /* ── Camera fills the whole background ── */
        #video {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            z-index: 0;
        }

        /* ── Full-screen overlay — children opt-in to pointer events ── */
        #overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 10;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: stretch;
        }

        /* ════════════════════════════════════════
           TOP: Search bar
        ════════════════════════════════════════ */
        #search-area {
            pointer-events: auto;
            padding: calc(env(safe-area-inset-top, 12px) + 8px) 16px 0;
            position: relative;
            z-index: 200;
        }

        #search-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #search-wrapper {
            flex: 1;
            min-width: 0;
            position: relative;
            display: flex;
            align-items: center;
            background: #fff;
            border-radius: 26px;
            height: 52px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.55);
        }

        #map-picker-btn {
            flex-shrink: 0;
            width: 52px;
            height: 52px;
            border: none;
            border-radius: 26px;
            background: #fff;
            color: #111;
            font-size: 22px;
            line-height: 1;
            cursor: pointer;
            box-shadow: 0 4px 16px rgba(0,0,0,0.55);
            touch-action: manipulation;
        }

        #map-picker-btn:active {
            transform: scale(0.96);
        }

        #search-icon {
            flex-shrink: 0;
            width: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #555;
            font-size: 18px;
        }

        #search-input {
            flex: 1;
            border: none;
            outline: none;
            background: transparent;
            font-size: 16px;
            color: #111;
            padding-right: 12px;
            height: 100%;
        }

        #search-input::placeholder { color: #999; }

        /* Suggestions dropdown — sibling of search bar for reliable mobile taps */
        #suggestions {
            position: absolute;
            top: calc(env(safe-area-inset-top, 12px) + 8px + 52px + 6px);
            left: 16px;
            right: 16px;
            background: #fff;
            border-radius: 14px;
            box-shadow: 0 6px 24px rgba(0,0,0,0.45);
            overflow: hidden;
            z-index: 300;
            display: none;
            max-height: min(40vh, 280px);
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            pointer-events: auto;
            touch-action: manipulation;
        }

        .suggestion-item {
            display: flex;
            align-items: center;
            min-height: 52px;
            padding: 10px 16px;
            cursor: pointer;
            border-bottom: 1px solid #f0f0f0;
            color: #111;
            font-size: 14px;
            line-height: 1.3;
            touch-action: manipulation;
            -webkit-tap-highlight-color: rgba(0,0,0,0.08);
            user-select: none;
        }

        .suggestion-item:last-child { border-bottom: none; }

        .suggestion-item:active,
        .suggestion-item.selected { background: #eef4ff; }

        .suggestion-label {
            flex: 1;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            white-space: normal;
        }

        .suggestion-status {
            margin-top: 6px;
            padding: 6px 12px;
            font-size: 12px;
            color: #ccc;
            text-align: center;
            pointer-events: none;
        }

        #gps-status {
            margin-top: 4px;
            padding: 0 12px;
            font-size: 12px;
            color: #fbbf24;
            text-align: center;
            pointer-events: auto;
            cursor: pointer;
        }

        #gps-status.ready { color: #86efac; }
        #gps-status.error { color: #fca5a5; }

        .suggestion-distance {
            flex-shrink: 0;
            margin-left: 8px;
            font-size: 12px;
            color: #666;
            font-weight: 600;
        }

        .suggestion-pin {
            flex-shrink: 0;
            margin-right: 10px;
            color: #888;
            font-size: 16px;
        }

        /* Confirmation toast */
        #dest-confirm {
            margin-top: 8px;
            padding: 8px 14px;
            border-radius: 10px;
            background: rgba(0,140,0,0.88);
            color: #fff;
            font-size: 13px;
            text-align: center;
            display: none;
            pointer-events: none;
        }

        /* ════════════════════════════════════════
           CENTER: Command display
        ════════════════════════════════════════ */
        #command-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 0 24px;
            pointer-events: none;
        }

        #command {
            font-size: 48px;
            font-weight: 700;
            text-align: center;
            text-transform: uppercase;
            color: #fff;
            text-shadow: 0 2px 12px rgba(0,0,0,0.8);
            line-height: 1.1;
        }

        #details {
            margin-top: 12px;
            font-size: 16px;
            color: #ddd;
            text-align: center;
            text-shadow: 0 1px 6px rgba(0,0,0,0.9);
            max-width: 320px;
        }

        /* ════════════════════════════════════════
           BOTTOM: Route status + Start/Stop button
        ════════════════════════════════════════ */
        #bottom-area {
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-bottom: calc(env(safe-area-inset-bottom, 16px) + 16px);
            gap: 12px;
        }

        #route-status {
            pointer-events: none;
            padding: 8px 20px;
            border-radius: 20px;
            background: rgba(0,0,0,0.65);
            backdrop-filter: blur(6px);
            color: #fff;
            font-size: 15px;
            text-align: center;
            display: none;
            max-width: calc(100vw - 40px);
        }

        #controls {
            pointer-events: auto;
            display: flex;
            justify-content: center;
        }

        #start-btn, #stop-btn {
            width: 200px;
            height: 60px;
            font-size: 20px;
            font-weight: 700;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 18px rgba(0,0,0,0.5);
            transition: transform 0.15s;
        }

        #start-btn { background: #34c759; color: #fff; }
        #stop-btn  { background: #ff3b30; color: #fff; }

        #start-btn:active, #stop-btn:active { transform: scale(0.95); }

        /* ════════════════════════════════════════
           Connection dot (top-right)
        ════════════════════════════════════════ */
        #connection-status {
            position: fixed;
            top: calc(env(safe-area-inset-top, 12px) + 18px);
            right: 18px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #ff3b30;
            z-index: 20;
            pointer-events: none;
            transition: background 0.3s;
        }

        #connection-status.connected { background: #34c759; }

        /* ════════════════════════════════════════
           Debug panel (bottom-right, collapsible)
        ════════════════════════════════════════ */
        #debug-toggle {
            position: fixed;
            bottom: calc(env(safe-area-inset-bottom, 16px) + 80px);
            right: 12px;
            z-index: 30;
            pointer-events: auto;
            background: rgba(0,0,0,0.7);
            border: 1px solid #444;
            border-radius: 8px;
            color: #0f0;
            font-size: 11px;
            padding: 4px 8px;
            cursor: pointer;
            user-select: none;
        }

        #debug {
            position: fixed;
            bottom: calc(env(safe-area-inset-bottom, 16px) + 108px);
            left: 10px;
            right: 10px;
            max-height: 30vh;
            overflow-y: auto;
            padding: 8px 10px;
            background: rgba(0,0,0,0.88);
            border: 1px solid #333;
            border-radius: 8px;
            font-family: monospace;
            font-size: 11px;
            color: #0f0;
            z-index: 25;
            pointer-events: auto;
            display: none;
        }

        .hidden { display: none !important; }

        /* ════════════════════════════════════════
           Map destination picker (Leaflet)
        ════════════════════════════════════════ */
        #map-picker {
            position: fixed;
            inset: 0;
            z-index: 500;
            background: #111;
            display: flex;
            flex-direction: column;
            pointer-events: auto;
        }

        #map-canvas {
            flex: 1;
            min-height: 0;
            width: 100%;
            touch-action: none;
        }

        #map-picker-bar {
            flex-shrink: 0;
            padding: 12px 16px calc(env(safe-area-inset-bottom, 12px) + 12px);
            background: rgba(18, 18, 18, 0.96);
            border-top: 1px solid #333;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        #map-picker-label {
            color: #eee;
            font-size: 14px;
            line-height: 1.35;
            min-height: 2.7em;
        }

        #map-picker-actions {
            display: flex;
            gap: 8px;
        }

        #map-picker-actions button {
            flex: 1;
            min-height: 48px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            touch-action: manipulation;
        }

        #map-locate-btn {
            flex: 0 0 auto;
            width: 52px;
            background: #333;
            color: #fff;
            font-size: 20px;
        }

        #map-cancel-btn {
            background: #444;
            color: #fff;
        }

        #map-confirm-btn {
            background: #34c759;
            color: #fff;
        }

        #map-confirm-btn:disabled {
            background: #2a5c38;
            color: #aaa;
            cursor: default;
        }
    </style>
</head>
<body>

    <!-- Camera background -->
    <video id="video" autoplay playsinline muted></video>

    <!-- Connection indicator -->
    <div id="connection-status"></div>

    <!-- Main overlay -->
    <div id="overlay">

        <!-- TOP: Search bar -->
        <div id="search-area">
            <div id="search-row">
                <div id="search-wrapper">
                    <div id="search-icon">🔍</div>
                    <input
                        id="search-input"
                        type="search"
                        inputmode="search"
                        enterkeyhint="search"
                        placeholder="Search destination…"
                        autocomplete="off"
                        autocorrect="off"
                        autocapitalize="off"
                        spellcheck="false"
                    >
                </div>
                <button id="map-picker-btn" type="button" aria-label="Pick destination on map" title="Pick on map">🗺</button>
            </div>
            <div id="suggestions" role="listbox" aria-label="Place suggestions"></div>
            <div id="gps-status">📍 Getting your location…</div>
            <div id="search-status" class="suggestion-status"></div>
            <div id="dest-confirm"></div>
        </div>

        <!-- CENTER: Command display -->
        <div id="command-area">
            <div id="command">Ready</div>
            <div id="details">Tap Start to begin navigation</div>
        </div>

        <!-- BOTTOM: Route status + button -->
        <div id="bottom-area">
            <div id="route-status"></div>
            <div id="controls">
                <button id="start-btn" onclick="startNavigation()">Start Navigation</button>
                <button id="stop-btn"  onclick="stopNavigation()" class="hidden">Stop</button>
            </div>
        </div>

    </div>

    <!-- Debug panel toggle (outside overlay so it's always tappable) -->
    <div id="debug-toggle" onclick="toggleDebug()">DBG ▸</div>
    <div id="debug">debug log loading…</div>

    <!-- Full-screen map picker -->
    <div id="map-picker" class="hidden" aria-hidden="true">
        <div id="map-canvas"></div>
        <div id="map-picker-bar">
            <div id="map-picker-label">Tap the map to choose a destination</div>
            <div id="map-picker-actions">
                <button id="map-locate-btn" type="button" aria-label="Center on my location">📍</button>
                <button id="map-cancel-btn" type="button">Cancel</button>
                <button id="map-confirm-btn" type="button" disabled>Set destination</button>
            </div>
        </div>
    </div>

    <script
        src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
        crossorigin=""
    ></script>

    <script>
        // ============================================================
        // Debug log
        // ============================================================
        const _debugEl = document.getElementById('debug');
        const _debugLines = [];
        function dbg(...args) {
            const line =
                new Date().toLocaleTimeString() + ' ' +
                args.map(a => (typeof a === 'string' ? a : JSON.stringify(a))).join(' ');
            _debugLines.push(line);
            if (_debugLines.length > 40) _debugLines.shift();
            _debugEl.innerText = _debugLines.join('\n');
            _debugEl.scrollTop = _debugEl.scrollHeight;
            console.log(line);
        }

        function toggleDebug() {
            const panel = document.getElementById('debug');
            const btn   = document.getElementById('debug-toggle');
            if (panel.style.display === 'block') {
                panel.style.display = 'none';
                btn.textContent = 'DBG ▸';
            } else {
                panel.style.display = 'block';
                btn.textContent = 'DBG ▾';
            }
        }

        dbg('client v5 loaded — secure context:', window.isSecureContext,
            'mediaDevices:', !!navigator.mediaDevices);

        // ============================================================
        // Configuration
        // ============================================================
        const SERVER_URL = window.location.origin;
        // Match server INFERENCE_IMGSZ=192 — smaller JPEG = faster upload + decode.
        const CAPTURE_W = 256;
        const CAPTURE_H = 192;
        const JPEG_QUALITY = 0.65;

        // ============================================================
        // Global state
        // ============================================================
        const video       = document.getElementById('video');
        const commandDiv  = document.getElementById('command');
        const detailsDiv  = document.getElementById('details');
        const connStatus  = document.getElementById('connection-status');
        const startBtn    = document.getElementById('start-btn');
        const stopBtn     = document.getElementById('stop-btn');
        const routeStatus = document.getElementById('route-status');

        let isRunning   = false;
        let synth       = window.speechSynthesis;
        let frameCount  = 0;
        let lastPosition = { lat: null, lon: null, accuracy: null };
        let lastHeading  = null;
        let prevGeoPoint = null;   // for GPS-derived heading when compass absent
        let _geoWatchId  = null;
        let _locationPromise = null;

        function bearingDeg(lat1, lon1, lat2, lon2) {
            const toRad = d => d * Math.PI / 180;
            const dLon = toRad(lon2 - lon1);
            const y = Math.sin(dLon) * Math.cos(toRad(lat2));
            const x = Math.cos(toRad(lat1)) * Math.sin(toRad(lat2)) -
                      Math.sin(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.cos(dLon);
            return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
        }

        // ── On-device depth (Depth Anything V2 via transformers.js) ──
        // Depth runs on the phone GPU/NPU in the browser. We compute it on
        // every Nth processed frame and reuse the last value in between so a
        // ~300-700ms inference never blocks the per-frame upload loop. The
        // server falls back to its geometric proxy whenever depth_m is absent.
        const DEPTH_EVERY_N = 3;          // run depth on 1 of every N frames
        let lastDepthM      = null;       // most recent approx obstacle depth (m)
        let depthBusy       = false;      // guard: one inference at a time
        let _lastDepthLogAt = 0;

        // Reused capture buffer — avoids allocating a canvas every frame.
        const captureCanvas = document.createElement('canvas');
        captureCanvas.width = CAPTURE_W;
        captureCanvas.height = CAPTURE_H;
        const captureCtx = captureCanvas.getContext('2d');

        // ============================================================
        // Navigation toggle (tap status area or button)
        // ============================================================
        function toggleNavigation() {
            dbg('toggleNavigation tapped, isRunning=', isRunning);
            if (isRunning) {
                stopNavigation();
            } else {
                startNavigation();
            }
        }

        // ============================================================
        // Destination search — server proxies Nominatim (browser CORS blocks direct calls)
        // ============================================================
        const searchInput    = document.getElementById('search-input');
        const suggestionsEl  = document.getElementById('suggestions');
        const searchStatusEl = document.getElementById('search-status');
        const gpsStatusEl    = document.getElementById('gps-status');
        const destConfirm    = document.getElementById('dest-confirm');

        let _suggestTimer = null;
        let _suggestSeq = 0;
        let _suppressSearchInput = false;
        let _pickLock = false;

        function setSearchStatus(msg) {
            if (searchStatusEl) searchStatusEl.textContent = msg || '';
        }

        function formatDistance(meters) {
            if (meters == null || Number.isNaN(meters)) return '';
            const feet = meters * 3.281;
            if (feet < 1000) return Math.round(feet) + ' ft';
            return (meters / 1609.34).toFixed(1) + ' mi';
        }

        function updateGpsStatus(ok, detail) {
            if (!gpsStatusEl) return;
            gpsStatusEl.classList.remove('ready', 'error');
            if (ok && lastPosition.lat != null) {
                gpsStatusEl.classList.add('ready');
                const acc = lastPosition.accuracy != null
                    ? ` ±${Math.round(lastPosition.accuracy)}m`
                    : '';
                gpsStatusEl.textContent =
                    `📍 Location ready${acc} — nearby search enabled`;
            } else if (detail) {
                gpsStatusEl.classList.add('error');
                gpsStatusEl.textContent = '📍 Location needed — tap here to allow';
            } else {
                gpsStatusEl.textContent = '📍 Getting your location…';
            }
        }

        function applyGeoPosition(pos) {
            const lat = pos.coords.latitude;
            const lon = pos.coords.longitude;
            if (prevGeoPoint && (lat !== prevGeoPoint.lat || lon !== prevGeoPoint.lon)) {
                const moved = bearingDeg(prevGeoPoint.lat, prevGeoPoint.lon, lat, lon);
                if (pos.coords.speed == null || pos.coords.speed > 0.3) {
                    lastHeading = moved;
                }
            }
            prevGeoPoint = { lat, lon };
            const hadGps = lastPosition.lat != null;
            lastPosition.lat      = lat;
            lastPosition.lon      = lon;
            lastPosition.accuracy = pos.coords.accuracy;
            if (pos.coords.heading != null && !Number.isNaN(pos.coords.heading)) {
                lastHeading = pos.coords.heading;
            }
            updateGpsStatus(true);
            updateMapUserMarker();
            if (!hadGps) {
                const q = searchInput.value.trim();
                if (q.length >= 2) {
                    fetchSuggestions(q);
                }
            }
        }

        function ensureUserLocation() {
            if (lastPosition.lat != null && lastPosition.lon != null) {
                updateGpsStatus(true);
                return Promise.resolve(true);
            }
            if (!('geolocation' in navigator)) {
                updateGpsStatus(false, 'unsupported');
                return Promise.resolve(false);
            }
            if (_locationPromise) return _locationPromise;

            updateGpsStatus(false);
            setSearchStatus('Waiting for GPS… allow location if prompted');

            _locationPromise = new Promise((resolve) => {
                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        applyGeoPosition(pos);
                        _locationPromise = null;
                        resolve(true);
                    },
                    (err) => {
                        dbg('getCurrentPosition:', err.message);
                        updateGpsStatus(false, err.message);
                        _locationPromise = null;
                        resolve(false);
                    },
                    { enableHighAccuracy: true, maximumAge: 0, timeout: 15000 }
                );
            });
            return _locationPromise;
        }

        async function fetchSuggestions(query) {
            if (query.length < 2) {
                hideSuggestions();
                setSearchStatus('');
                return;
            }
            await ensureUserLocation();
            const seq = ++_suggestSeq;
            const hasGps = lastPosition.lat != null && lastPosition.lon != null;
            if (!hasGps) {
                setSearchStatus('Allow location above, then search again for nearby places');
            } else {
                setSearchStatus('Searching nearby…');
            }
            try {
                let url = `${SERVER_URL}/search_places?q=${encodeURIComponent(query)}`;
                if (hasGps) {
                    url += `&lat=${encodeURIComponent(lastPosition.lat)}&lon=${encodeURIComponent(lastPosition.lon)}`;
                }
                const r = await fetch(url);
                const data = await r.json();
                if (seq !== _suggestSeq) return;
                if (!data.ok) {
                    hideSuggestions();
                    setSearchStatus('Search unavailable — press Enter to try anyway');
                    return;
                }
                showSuggestions(data.results || []);
            } catch (e) {
                if (seq !== _suggestSeq) return;
                hideSuggestions();
                setSearchStatus('Search error — check connection');
                dbg('search failed:', e.message);
            }
        }

        function selectSuggestion(result) {
            if (_pickLock) return;
            _pickLock = true;
            setTimeout(() => { _pickLock = false; }, 400);

            _suppressSearchInput = true;
            searchInput.value = result.display_name;
            _suppressSearchInput = false;

            clearTimeout(_suggestTimer);
            _suggestSeq++;
            hideSuggestions();
            setSearchStatus('');
            searchInput.blur();

            setDestination(
                result.display_name,
                parseFloat(result.lat),
                parseFloat(result.lon),
            );
        }

        function bindSuggestionItem(item, result) {
            const pick = (e) => {
                e.preventDefault();
                e.stopPropagation();
                item.classList.add('selected');
                selectSuggestion(result);
            };
            item.addEventListener('pointerup', pick);
            item.addEventListener('click', pick);
        }

        function showSuggestions(results) {
            suggestionsEl.innerHTML = '';
            if (!results || results.length === 0) {
                suggestionsEl.style.display = 'none';
                setSearchStatus('No places found');
                return;
            }
            setSearchStatus('');
            results.slice(0, 5).forEach((result) => {
                const item = document.createElement('div');
                item.className = 'suggestion-item';
                item.setAttribute('role', 'option');

                const pin = document.createElement('span');
                pin.className = 'suggestion-pin';
                pin.textContent = '📍';

                const label = document.createElement('span');
                label.className = 'suggestion-label';
                label.textContent = result.display_name;

                item.appendChild(pin);
                item.appendChild(label);

                const distText = formatDistance(result.distance_m);
                if (distText) {
                    const dist = document.createElement('span');
                    dist.className = 'suggestion-distance';
                    dist.textContent = distText;
                    item.appendChild(dist);
                }

                bindSuggestionItem(item, result);
                suggestionsEl.appendChild(item);
            });
            suggestionsEl.style.display = 'block';
        }

        function hideSuggestions() {
            suggestionsEl.style.display = 'none';
            suggestionsEl.innerHTML = '';
        }

        async function setDestination(address, lat, lon) {
            if (!address) address = searchInput.value.trim();
            if (!address && (lat == null || lon == null)) {
                dbg('destination empty');
                return;
            }

            await ensureUserLocation();

            hideSuggestions();

            destConfirm.style.display = 'block';
            destConfirm.style.background = 'rgba(0,0,0,0.75)';
            destConfirm.textContent = '🔍 Finding route…';

            const body = new URLSearchParams();
            if (lat != null && lon != null && !Number.isNaN(lat) && !Number.isNaN(lon)) {
                body.append('lat', String(lat));
                body.append('lon', String(lon));
                body.append('address', address || `${lat},${lon}`);
            } else {
                body.append('address', address);
                if (lastPosition.lat != null && lastPosition.lon != null) {
                    body.append('near_lat', String(lastPosition.lat));
                    body.append('near_lon', String(lastPosition.lon));
                }
            }
            try {
                const r = await fetch(SERVER_URL + '/set_destination', { method: 'POST', body });
                const j = await r.json();
                if (j.ok) {
                    destConfirm.style.background = 'rgba(0,140,0,0.88)';
                    const label = address || 'destination';
                    destConfirm.textContent = isRunning
                        ? '✓ Navigating to ' + label
                        : '✓ Destination set — tap Start for directions to ' + label;
                    dbg('destination set:', address, '→', j.lat.toFixed(4) + ',' + j.lon.toFixed(4));
                    setTimeout(() => { destConfirm.style.display = 'none'; }, 4000);
                } else {
                    destConfirm.style.background = 'rgba(180,0,0,0.88)';
                    destConfirm.textContent = '✗ Not found: ' + address;
                    dbg('destination error:', j.error);
                    setTimeout(() => { destConfirm.style.display = 'none'; }, 4000);
                }
            } catch (e) {
                destConfirm.style.background = 'rgba(180,0,0,0.88)';
                destConfirm.textContent = '✗ Connection error';
                dbg('destination request failed:', e.message);
                setTimeout(() => { destConfirm.style.display = 'none'; }, 4000);
            }
        }

            }
        }

        // ============================================================
        // Map picker — tap OpenStreetMap to choose destination
        // ============================================================
        const mapPickerEl   = document.getElementById('map-picker');
        const mapPickerLabel = document.getElementById('map-picker-label');
        const mapConfirmBtn = document.getElementById('map-confirm-btn');
        const mapCancelBtn  = document.getElementById('map-cancel-btn');
        const mapLocateBtn  = document.getElementById('map-locate-btn');
        const mapPickerBtn  = document.getElementById('map-picker-btn');

        const _mapState = {
            map: null,
            destMarker: null,
            userMarker: null,
            pick: null,       // { lat, lon, label }
            reverseSeq: 0,
        };

        function defaultMapCenter() {
            if (lastPosition.lat != null && lastPosition.lon != null) {
                return [lastPosition.lat, lastPosition.lon];
            }
            return [33.4255, -111.94];
        }

        function ensureMapPicker() {
            if (_mapState.map || typeof L === 'undefined') return _mapState.map;
            const center = defaultMapCenter();
            _mapState.map = L.map('map-canvas', {
                zoomControl: true,
                attributionControl: true,
            }).setView(center, 16);

            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                maxZoom: 19,
                attribution: '&copy; OpenStreetMap',
            }).addTo(_mapState.map);

            _mapState.userMarker = L.circleMarker(center, {
                radius: 8,
                color: '#2563eb',
                fillColor: '#3b82f6',
                fillOpacity: 0.95,
                weight: 2,
            }).addTo(_mapState.map);
            _mapState.userMarker.bindTooltip('You', { permanent: false, direction: 'top' });

            _mapState.map.on('click', (e) => {
                pickMapDestination(e.latlng.lat, e.latlng.lng);
            });

            return _mapState.map;
        }

        function updateMapUserMarker() {
            if (!_mapState.map || lastPosition.lat == null || lastPosition.lon == null) return;
            const latlng = [lastPosition.lat, lastPosition.lon];
            _mapState.userMarker.setLatLng(latlng);
        }

        async function reverseGeocodeLabel(lat, lon) {
            const seq = ++_mapState.reverseSeq;
            mapPickerLabel.textContent = 'Looking up address…';
            try {
                const url = `${SERVER_URL}/reverse_geocode?lat=${encodeURIComponent(lat)}&lon=${encodeURIComponent(lon)}`;
                const r = await fetch(url);
                const data = await r.json();
                if (seq !== _mapState.reverseSeq) return null;
                if (data.ok && data.display_name) return data.display_name;
            } catch (e) {
                dbg('reverse geocode failed:', e.message);
            }
            return `${lat.toFixed(5)}, ${lon.toFixed(5)}`;
        }

        async function pickMapDestination(lat, lon) {
            if (!_mapState.map) return;
            if (_mapState.destMarker) {
                _mapState.destMarker.setLatLng([lat, lon]);
            } else {
                _mapState.destMarker = L.marker([lat, lon], {
                    draggable: true,
                    autoPan: true,
                    title: 'Destination',
                }).addTo(_mapState.map);
                _mapState.destMarker.on('dragend', () => {
                    const pos = _mapState.destMarker.getLatLng();
                    pickMapDestination(pos.lat, pos.lng);
                });
            }
            mapConfirmBtn.disabled = true;
            mapPickerLabel.textContent = 'Looking up address…';
            const label = await reverseGeocodeLabel(lat, lon);
            _mapState.pick = { lat, lon, label };
            mapPickerLabel.textContent = label;
            mapConfirmBtn.disabled = false;
        }

        async function openMapPicker() {
            hideSuggestions();
            setSearchStatus('');
            await ensureUserLocation();

            mapPickerEl.classList.remove('hidden');
            mapPickerEl.setAttribute('aria-hidden', 'false');
            mapConfirmBtn.disabled = true;
            mapPickerLabel.textContent = 'Tap the map to choose a destination';
            _mapState.pick = null;
            _mapState.reverseSeq++;

            if (_mapState.destMarker && _mapState.map) {
                _mapState.map.removeLayer(_mapState.destMarker);
                _mapState.destMarker = null;
            }

            ensureMapPicker();
            updateMapUserMarker();

            const center = defaultMapCenter();
            _mapState.map.setView(center, _mapState.map.getZoom() || 16);

            setTimeout(() => {
                _mapState.map.invalidateSize(true);
            }, 80);
        }

        function closeMapPicker() {
            mapPickerEl.classList.add('hidden');
            mapPickerEl.setAttribute('aria-hidden', 'true');
            _mapState.reverseSeq++;
        }

        async function confirmMapPicker() {
            if (!_mapState.pick) return;
            const { lat, lon, label } = _mapState.pick;
            closeMapPicker();
            _suppressSearchInput = true;
            searchInput.value = label;
            _suppressSearchInput = false;
            await setDestination(label, lat, lon);
        }

        function centerMapOnUser() {
            if (!_mapState.map) return;
            if (lastPosition.lat == null || lastPosition.lon == null) {
                mapPickerLabel.textContent = 'Waiting for GPS… allow location if prompted';
                ensureUserLocation();
                return;
            }
            updateMapUserMarker();
            _mapState.map.setView([lastPosition.lat, lastPosition.lon], 17, { animate: true });
        }

        // ============================================================
        // GPS + compass
        // ============================================================
        function startGeolocation() {
            if (!('geolocation' in navigator)) {
                console.log('Geolocation not supported');
                updateGpsStatus(false, 'unsupported');
                return;
            }
            if (_geoWatchId != null) return;
            _geoWatchId = navigator.geolocation.watchPosition(
                (pos) => applyGeoPosition(pos),
                (err) => {
                    console.log('Geolocation error:', err.message);
                    updateGpsStatus(false, err.message);
                    if (isRunning) {
                        detailsDiv.textContent = '⚠ GPS error: ' + err.message;
                    }
                },
                { enableHighAccuracy: true, maximumAge: 500, timeout: 10000 }
            );
            // Prompt for location immediately (may need user gesture on iOS).
            ensureUserLocation();
        }

        function startCompass() {
            const handler = (event) => {
                if (typeof event.webkitCompassHeading === 'number') {
                    lastHeading = event.webkitCompassHeading;
                } else if (typeof event.alpha === 'number') {
                    lastHeading = (360 - event.alpha) % 360;
                }
            };
            if (
                typeof DeviceOrientationEvent !== 'undefined' &&
                typeof DeviceOrientationEvent.requestPermission === 'function'
            ) {
                DeviceOrientationEvent.requestPermission()
                    .then((state) => {
                        if (state === 'granted') {
                            window.addEventListener('deviceorientation', handler, true);
                        }
                    })
                    .catch(() => {});
            } else {
                window.addEventListener('deviceorientationabsolute', handler, true);
                window.addEventListener('deviceorientation', handler, true);
            }
        }

        // ============================================================
        // Camera
        // ============================================================
        async function initCamera() {
            try {
                if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                    throw new Error(
                        'Camera API unavailable. Page must be served over HTTPS ' +
                        '(or http://localhost). isSecureContext=' + window.isSecureContext
                    );
                }
                dbg('requesting camera…');
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        facingMode: 'environment',
                        width:  { ideal: 640 },
                        height: { ideal: 480 }
                    }
                });
                video.srcObject = stream;
                dbg('camera ok');
            } catch (error) {
                commandDiv.textContent = 'Camera blocked';
                detailsDiv.textContent = (error.name || 'Error') + ': ' + error.message;
                dbg('CAMERA ERROR:', error.name || 'Error', error.message);
                console.error('Camera error:', error);
            }
        }

        // ============================================================
        // Server connection check
        // ============================================================
        async function checkConnection() {
            try {
                const response = await fetch(SERVER_URL + '/health');
                const data = await response.json();
                if (data.status === 'ok') {
                    connStatus.classList.add('connected');
                    return true;
                }
            } catch (error) {
                connStatus.classList.remove('connected');
                console.error('Server connection failed:', error);
                return false;
            }
            return false;
        }

        // ============================================================
        // Start navigation
        // ============================================================
        async function startNavigation() {
            dbg('startNavigation() tapped');
            const connected = await checkConnection();
            if (!connected) {
                dbg('server unreachable at', SERVER_URL);
                alert('Cannot connect to server at ' + SERVER_URL +
                    '\n\nMake sure:\n1. Server is running on laptop\n2. Phone and laptop are on same WiFi\n3. IP address is correct');
                return;
            }
            dbg('server reachable');
            await ensureUserLocation();

            // Check if video is ready
            if (!video.videoWidth || !video.videoHeight) {
                dbg('video not ready, dimensions:', video.videoWidth, 'x', video.videoHeight);
                commandDiv.textContent = 'Camera not ready';
                detailsDiv.textContent = 'Please allow camera access';
                alert('Camera not ready. Please allow camera access and try again.');
                return;
            }
            dbg('video ready:', video.videoWidth, 'x', video.videoHeight);

            isRunning  = true;
            frameCount = 0;

            // iOS needs an explicit tap before compass events fire.
            if (
                typeof DeviceOrientationEvent !== 'undefined' &&
                typeof DeviceOrientationEvent.requestPermission === 'function'
            ) {
                try {
                    const state = await DeviceOrientationEvent.requestPermission();
                    dbg('compass permission:', state);
                } catch (e) {
                    dbg('compass permission error:', e.message);
                }
            }

            startBtn.classList.add('hidden');
            stopBtn.classList.remove('hidden');

            commandDiv.textContent = 'Starting…';
            detailsDiv.textContent = 'Initializing navigation';

            processFrame();
        }

        // ============================================================
        // Stop navigation
        // ============================================================
        function stopNavigation() {
            isRunning = false;

            startBtn.classList.remove('hidden');
            stopBtn.classList.add('hidden');

            routeStatus.style.display = 'none';
            commandDiv.textContent = 'Stopped';
            detailsDiv.textContent = 'Tap Start to resume';
        }

        // ============================================================
        // On-device depth update (non-blocking)
        // ============================================================
        async function maybeUpdateDepth(canvas) {
            if (depthBusy) return;
            if (frameCount % DEPTH_EVERY_N !== 0) return;
            if (typeof window.computeDepthMeters !== 'function') return;
            depthBusy = true;
            try {
                const m = await window.computeDepthMeters(canvas);
                if (m != null && !Number.isNaN(m)) {
                    lastDepthM = m;
                    const now = Date.now();
                    if (now - _lastDepthLogAt > 2000) {
                        _lastDepthLogAt = now;
                        dbg('depth', m.toFixed(2) + 'm', window.__depthStatus || '');
                    }
                }
            } catch (e) {
                dbg('depth error:', e.message);
            } finally {
                depthBusy = false;
            }
        }

        // ============================================================
        // Process frame
        // ============================================================
        async function processFrame() {
            if (!isRunning) return;

            frameCount++;

            // Check video is still ready
            if (!video.videoWidth || !video.videoHeight) {
                dbg('ERROR: video lost dimensions');
                commandDiv.textContent = 'Camera Error';
                detailsDiv.textContent = 'Video stream lost';
                stopNavigation();
                return;
            }

            // ── Capture at CAPTURE_W×CAPTURE_H — matches server inference size ──
            try {
                captureCtx.drawImage(video, 0, 0, CAPTURE_W, CAPTURE_H);
            } catch (e) {
                dbg('ERROR drawing video to canvas:', e.message);
                commandDiv.textContent = 'Capture Error';
                detailsDiv.textContent = e.message;
                stopNavigation();
                return;
            }

            // Fire-and-forget on-device depth on every Nth frame. It updates
            // `lastDepthM` for subsequent frames rather than blocking this one.
            maybeUpdateDepth(captureCanvas);

            captureCanvas.toBlob(async (blob) => {
                if (!blob) {
                    dbg('ERROR: toBlob returned null');
                    return;
                }
                
                const formData = new FormData();
                formData.append('frame', blob, 'frame.jpg');
                if (lastPosition.lat      != null) formData.append('lat',      String(lastPosition.lat));
                if (lastPosition.lon      != null) formData.append('lon',      String(lastPosition.lon));
                if (lastPosition.accuracy != null) formData.append('accuracy', String(lastPosition.accuracy));
                if (lastHeading           != null) formData.append('heading',  String(lastHeading));
                if (lastDepthM            != null) formData.append('depth_m',  String(lastDepthM));

                const t0 = Date.now();
                try {
                    const response = await fetch(SERVER_URL + '/process_frame', {
                        method: 'POST',
                        body: formData
                    });

                    if (!response.ok) throw new Error('Server error: ' + response.status);

                    const result = await response.json();
                    const rtt = Date.now() - t0;

                    // ── Command text ──
                    commandDiv.textContent = result.phrase;

                    // ── Details / route cue ──
                    let detailText = result.rationale || '';
                    const rs = result.route_status;
                    if (result.facts && result.facts.route_cue) {
                        const rc   = result.facts.route_cue;
                        if (rc.turn === 'loading') {
                            detailText = '⏳ Loading walking route…';
                        } else if (rc.turn === 'failed') {
                            detailText = '✗ Walking route unavailable — check connection or set destination again';
                        } else {
                            const feet = Math.round((rc.meters_to_turn || 0) * 3.281);
                            if (rc.turn === 'stop') {
                                detailText = '📍 Destination in ' + feet + ' ft';
                            } else if (rc.turn === 'left') {
                                detailText = '↰ Turn left in ' + feet + ' ft';
                            } else if (rc.turn === 'right') {
                                detailText = '↱ Turn right in ' + feet + ' ft';
                            } else if (rc.turn === 'forward') {
                                detailText = '↑ Continue ' + feet + ' ft';
                            }
                        }
                    } else if (rs && rs.destination_set) {
                        if (rs.loading) {
                            detailText = '⏳ Loading walking route…';
                        } else if (rs.failed) {
                            detailText = '✗ Walking route unavailable — check connection or set destination again';
                        } else if (!rs.active) {
                            detailText = '⏳ Waiting for walking route…';
                        }
                    }
                    if (lastPosition.lat == null) {
                        detailText = '⚠ No GPS — allow location for turn-by-turn directions';
                    } else if (lastHeading == null && detailText.indexOf('Loading') === -1 && detailText.indexOf('Waiting') === -1) {
                        detailText = (detailText ? detailText + ' · ' : '') +
                            '⚠ Walk a few steps so heading can be detected';
                    }
                    detailsDiv.textContent = detailText;

                    // ── Route status strip ──
                    if ((result.facts && result.facts.route_cue) || (rs && rs.destination_set)) {
                        routeStatus.textContent = detailText;
                        routeStatus.style.display = 'block';
                    } else {
                        routeStatus.style.display = 'none';
                    }

                    // ── Speech ──
                    const wantsToSpeak =
                        (synth && Array.isArray(result.alerts) && result.alerts.length > 0) ||
                        (synth && result.speak);
                    if (wantsToSpeak) synth.cancel();

                    if (synth && Array.isArray(result.alerts)) {
                        for (const alert of result.alerts) {
                            const aUtt = new SpeechSynthesisUtterance(alert.phrase);
                            aUtt.rate   = 1.15;
                            aUtt.volume = 1.0;
                            synth.speak(aUtt);
                            dbg('alert:', alert.phrase);
                        }
                    }

                    if (result.speak && synth) {
                        const utterance = new SpeechSynthesisUtterance(result.phrase);
                        utterance.rate   = 1.2;
                        utterance.volume = 1.0;
                        synth.speak(utterance);
                    }

                    connStatus.classList.add('connected');
                    const gps = lastPosition.lat != null
                        ? `gps=${lastPosition.lat.toFixed(5)},${lastPosition.lon.toFixed(5)}`
                        : 'gps=none';
                    const hdg = lastHeading != null ? `hdg=${Math.round(lastHeading)}` : 'hdg=none';
                    dbg(`rtt=${rtt}ms server=${result.processing_time_ms}ms ${gps} ${hdg} cmd=${result.command}`);

                } catch (error) {
                    console.error('Processing error:', error);
                    commandDiv.textContent = 'Error';
                    detailsDiv.textContent = error.message;
                    connStatus.classList.remove('connected');
                }

                // ── No fixed delay — fire next frame immediately after response ──
                // This means latency = network RTT + server processing only.
                // No extra 300ms wait added on top.
                if (isRunning) processFrame();
            }, 'image/jpeg', JPEG_QUALITY);
        }

        // ============================================================
        // Initialize on load
        // ============================================================
        window.onload = async () => {
            console.log('Initializing…');
            await initCamera();
            await checkConnection();
            startGeolocation();
            startCompass();

            // Search input: request GPS on focus (iOS needs user gesture)
            searchInput.addEventListener('focus', () => {
                ensureUserLocation();
            });

            if (gpsStatusEl) {
                gpsStatusEl.addEventListener('click', () => {
                    ensureUserLocation();
                });
            }

            if (mapPickerBtn) {
                mapPickerBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    openMapPicker();
                });
            }
            if (mapCancelBtn) {
                mapCancelBtn.addEventListener('click', closeMapPicker);
            }
            if (mapConfirmBtn) {
                mapConfirmBtn.addEventListener('click', confirmMapPicker);
            }
            if (mapLocateBtn) {
                mapLocateBtn.addEventListener('click', centerMapOnUser);
            }

            // Search input: debounced suggestions on typing
            searchInput.addEventListener('input', () => {
                if (_suppressSearchInput) return;
                clearTimeout(_suggestTimer);
                const q = searchInput.value.trim();
                _suggestTimer = setTimeout(() => fetchSuggestions(q), 300);
            });

            // Enter key submits the current text directly
            searchInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    clearTimeout(_suggestTimer);
                    _suggestSeq++;
                    hideSuggestions();
                    setSearchStatus('');
                    setDestination(searchInput.value.trim());
                    searchInput.blur();
                }
            });

            // Tap outside search area hides suggestions (use click — avoids iOS pointer race)
            document.addEventListener('click', (e) => {
                const area = document.getElementById('search-area');
                if (area && !area.contains(e.target)) {
                    hideSuggestions();
                    setSearchStatus('');
                }
            });

            console.log('Ready!');
        };

        // Keep screen awake
        if ('wakeLock' in navigator) {
            navigator.wakeLock.request('screen').catch(err => {
                console.log('Wake lock error:', err);
            });
        }
    </script>

    <!-- ============================================================
         On-device monocular depth (Depth Anything V2 via transformers.js).
         Runs in the phone browser on WebGPU (falls back to WASM). Exposes
         window.computeDepthMeters(canvas) -> Promise<number|null>. The phone
         turns the model's per-frame relative depth into an approximate
         obstacle distance in meters; the server's bucketize() consumes it
         unchanged. No hosted GPU required.
    ============================================================ -->
    <script type="module">
        import {
            pipeline,
            env,
        } from 'https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.5.1';

        // Allow remote model download from the HuggingFace hub; disable the
        // local-model lookup (we have no bundled weights).
        env.allowLocalModels = false;

        const MODEL_ID = 'onnx-community/depth-anything-v2-small';

        // Calibration. Depth Anything outputs *relative inverse depth*
        // (larger = closer), normalized per frame. We take a high percentile
        // of the predicted depth in the center-bottom walking band as the
        // "nearest object" reading, normalize it against the frame's own
        // min/max to a [0,1] closeness, then map closeness -> meters. The
        // bounds below define the spoken-distance range; tune DEPTH_CALIBRATION
        // on your phone (stand a known distance from a wall and read the log).
        const DEPTH_MIN_M       = 0.5;   // clamp floor (very close)
        const DEPTH_MAX_M       = 8.0;   // clamp ceiling ("far")
        const DEPTH_CALIBRATION = 1.0;   // multiplicative scale, tune on device
        const NEAR_PERCENTILE   = 0.90;  // 0.90 = treat closest 10% as "object"

        let depthPipe    = null;
        let depthLoading = false;
        window.__depthStatus = 'idle';

        async function initDepth() {
            if (depthPipe || depthLoading) return;
            depthLoading = true;
            const device = ('gpu' in navigator) ? 'webgpu' : 'wasm';
            window.__depthStatus = 'loading (' + device + ')';
            console.log('[depth] loading', MODEL_ID, 'on', device);
            try {
                depthPipe = await pipeline('depth-estimation', MODEL_ID, {
                    device,
                    dtype: device === 'webgpu' ? 'fp16' : 'q8',
                });
                window.__depthStatus = 'ready (' + device + ')';
                console.log('[depth] ready on', device);
            } catch (e) {
                window.__depthStatus = 'failed: ' + (e && e.message);
                console.error('[depth] load failed', e);
                depthPipe = null;
            } finally {
                depthLoading = false;
            }
        }

        window.computeDepthMeters = async function (canvas) {
            if (!depthPipe) { initDepth(); return null; }
            try {
                const out = await depthPipe(canvas);
                const t = out && out.predicted_depth;
                if (!t || !t.data || !t.dims) return null;

                const data = t.data; // Float32Array, larger = closer
                let h, w;
                if (t.dims.length === 3) { h = t.dims[1]; w = t.dims[2]; }
                else if (t.dims.length === 2) { h = t.dims[0]; w = t.dims[1]; }
                else { return null; }

                // Global min/max for per-frame normalization.
                let gmin = Infinity, gmax = -Infinity;
                for (let i = 0; i < data.length; i++) {
                    const v = data[i];
                    if (v < gmin) gmin = v;
                    if (v > gmax) gmax = v;
                }
                if (!(gmax > gmin)) return null;

                // Center-bottom walking band: bottom 40% rows, center 50% cols.
                const y0 = Math.floor(h * 0.60);
                const x0 = Math.floor(w * 0.25);
                const x1 = Math.floor(w * 0.75);
                const band = [];
                for (let y = y0; y < h; y++) {
                    const row = y * w;
                    for (let x = x0; x < x1; x++) band.push(data[row + x]);
                }
                if (band.length === 0) return null;

                // Nearest object = high inverse-depth percentile in the band.
                band.sort((a, b) => a - b);
                const idx = Math.min(
                    band.length - 1,
                    Math.floor(band.length * NEAR_PERCENTILE)
                );
                const near = band[idx];

                // closeness in [0,1] (1 = closest pixel in the frame).
                const closeness = (near - gmin) / (gmax - gmin);
                // Closer -> fewer meters (inverse mapping).
                let meters = DEPTH_MAX_M - closeness * (DEPTH_MAX_M - DEPTH_MIN_M);
                meters *= DEPTH_CALIBRATION;
                meters = Math.max(DEPTH_MIN_M, Math.min(DEPTH_MAX_M, meters));
                return meters;
            } catch (e) {
                window.__depthStatus = 'infer error: ' + (e && e.message);
                console.error('[depth] inference error', e);
                return null;
            }
        };

        window.initDepth = initDepth;
        // Kick off the (cached) model download immediately so it's ready by
        // the time the user taps Start.
        initDepth();
    </script>
