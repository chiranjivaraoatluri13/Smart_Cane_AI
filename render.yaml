services:
  - type: web
    name: smart-cane-ai
    runtime: python
    buildCommand: pip install -r requirements-cloud.txt
    startCommand: gunicorn phone_server_cloud:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: PROCESS_EVERY_N_FRAMES
        value: "10"
      - key: SEGMENTER_BACKEND
        value: segformer_onnx
      - key: SEGFORMER_MODEL_ID
        value: nvidia/segformer-b0-finetuned-ade-512-512
      - key: SEGFORMER_DEVICE
        value: cpu
      - key: SEGFORMER_ONNX_PATH
        value: segformer_b0_ade20k_int8.onnx
      - key: INFERENCE_IMGSZ
        value: "192"
      # Match this to the vCPUs your Render plan allocates (Standard = 1).
      # Leaving ORT on "all cores" oversubscribes the container and makes the
      # INT8 model several times slower. Raise to 2 if you move to a 2-vCPU plan.
      - key: ONNX_INTRA_OP_THREADS
        value: "1"
      # Cloud reasoning uses native-resolution stats; skip 48×48→frame upscale.
      - key: SEG_UPSCALE_CLASS_MAP
        value: "false"
      - key: TTS_ENABLED
        value: "false"
      - key: USE_LLM
        value: "false"
      - key: USE_CARE_HTTP
        value: "false"
      - key: COMMAND_COOLDOWN_SEC
        value: "4.0"
      - key: COMMAND_DWELL_FRAMES
        value: "2"
      - key: MIN_SPEECH_GAP_SEC
        value: "1.5"
      - key: STOP_HOLD_FRAMES
        value: "8"
      - key: HAZARD_OBSTACLE_RATIO
        value: "0.20"
      - key: ALERTS_ENABLED
        value: "false"
      - key: ALERT_MIN_WEIGHTED_PIXELS
        value: "1500.0"
      - key: ALERT_MAX_SIMULTANEOUS_CATEGORIES
        value: "2"
      - key: USE_MAP_GUIDANCE
        value: "true"
      - key: OSRM_BASE_URL
        value: "https://router.project-osrm.org/route/v1/foot"
      - key: BUILD_TIMESTAMP
        value: "2026-05-31-rebuild"
