<!DOCTYPE html>
<html>
<head>
    <title>Simple Camera Test</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; padding: 20px; }
        video { width: 640px; border: 2px solid #0f0; }
        button { padding: 20px; font-size: 20px; margin: 10px; }
        #log { margin-top: 20px; white-space: pre-wrap; }
    </style>
</head>
<body>
    <h1>SIMPLE TEST</h1>
    <video id="video" autoplay playsinline></video>
    <br>
    <button onclick="start()">START</button>
    <div id="log"></div>
    
    <script>
        const video = document.getElementById('video');
        const log = document.getElementById('log');
        let running = false;
        
        function addLog(msg) {
            log.textContent += new Date().toLocaleTimeString() + ' - ' + msg + '\n';
            console.log(msg);
        }
        
        async function start() {
            addLog('START clicked');
            
            // Get camera
            try {
                addLog('Requesting camera...');
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'user', width: 640, height: 480 }
                });
                video.srcObject = stream;
                addLog('Camera OK');
                
                // Wait for video to be ready
                await new Promise(resolve => {
                    video.onloadedmetadata = resolve;
                });
                await video.play();
                addLog('Video playing: ' + video.videoWidth + 'x' + video.videoHeight);
                
            } catch(e) {
                addLog('CAMERA ERROR: ' + e.message);
                return;
            }
            
            // Test server
            try {
                addLog('Testing server...');
                const r = await fetch('http://localhost:5000/health');
                const j = await r.json();
                addLog('Server OK: ' + JSON.stringify(j));
            } catch(e) {
                addLog('SERVER ERROR: ' + e.message);
                return;
            }
            
            // Send one frame
            try {
                addLog('Capturing frame...');
                const canvas = document.createElement('canvas');
                canvas.width = 320;
                canvas.height = 240;
                canvas.getContext('2d').drawImage(video, 0, 0, 320, 240);
                
                const blob = await new Promise(r => canvas.toBlob(r, 'image/jpeg', 0.7));
                addLog('Blob size: ' + blob.size + ' bytes');
                
                const fd = new FormData();
                fd.append('frame', blob, 'frame.jpg');
                
                addLog('Sending to server...');
                const t0 = Date.now();
                const resp = await fetch('http://localhost:5000/process_frame', {
                    method: 'POST',
                    body: fd
                });
                
                if (!resp.ok) {
                    addLog('Server returned: ' + resp.status);
                    return;
                }
                
                const result = await resp.json();
                const rtt = Date.now() - t0;
                
                addLog('SUCCESS!');
                addLog('RTT: ' + rtt + 'ms');
                addLog('Server time: ' + result.processing_time_ms + 'ms');
                addLog('Command: ' + result.command);
                addLog('Phrase: ' + result.phrase);
                addLog('Confidence: ' + result.confidence);
                
                // Start loop
                running = true;
                addLog('Starting continuous loop...');
                loop();
                
            } catch(e) {
                addLog('FRAME ERROR: ' + e.message);
                addLog('Stack: ' + e.stack);
            }
        }
        
        async function loop() {
            if (!running) return;
            
            const canvas = document.createElement('canvas');
            canvas.width = 320;
            canvas.height = 240;
            canvas.getContext('2d').drawImage(video, 0, 0, 320, 240);
            
            const blob = await new Promise(r => canvas.toBlob(r, 'image/jpeg', 0.7));
            const fd = new FormData();
            fd.append('frame', blob, 'frame.jpg');
            
            const t0 = Date.now();
            const resp = await fetch('http://localhost:5000/process_frame', {
                method: 'POST',
                body: fd
            });
            const result = await resp.json();
            const rtt = Date.now() - t0;
            
            addLog('Frame: cmd=' + result.command + ' rtt=' + rtt + 'ms server=' + result.processing_time_ms + 'ms');
            
            // Continue
            setTimeout(loop, 0);
        }
    </script>
</body>
</html>
